name: Docker Publish

on:
  push:
    tags:
      - 'v*'

env:
  IMAGE: huluwz/pg-ethiopian-calendar

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg_version: [14, 15, 16, 17]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 cross-compilation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version and build metadata
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Compute tags
        id: tags
        run: |
          VERSION=${{ steps.meta.outputs.version }}
          PG=${{ matrix.pg_version }}
          TAGS="${{ env.IMAGE }}:${VERSION}-pg${PG}"
          # The highest PG version also gets the bare version and latest tags
          if [ "$PG" = "17" ]; then
            TAGS="${TAGS},${{ env.IMAGE }}:${VERSION},${{ env.IMAGE }}:latest"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.hub
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            PG_VERSION=${{ matrix.pg_version }}
            VERSION=${{ steps.meta.outputs.version }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            GIT_SHA=${{ github.sha }}
          tags: ${{ steps.tags.outputs.tags }}
          # GitHub Actions cache keeps layers warm across runs
          cache-from: type=gha,scope=pg${{ matrix.pg_version }}
          cache-to: type=gha,scope=pg${{ matrix.pg_version }},mode=max
          # Supply chain: attach SBOM and provenance attestations
          provenance: true
          sbom: true

      - name: Verify pushed image
        run: |
          docker pull ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}-pg${{ matrix.pg_version }}
          docker run --rm \
            -e POSTGRES_PASSWORD=postgres \
            ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}-pg${{ matrix.pg_version }} \
            postgres --version
