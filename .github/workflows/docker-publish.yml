name: Docker Publish

on:
  push:
    tags:
      - 'v*'

env:
  IMAGE: huluwz/pg-ethiopian-calendar

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg_version: [14, 15, 16, 17]

    permissions:
      contents: read
      id-token: write        # Cosign keyless signing via GitHub OIDC
      security-events: write # Trivy SARIF upload to Security tab

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up QEMU (for arm64 cross-compilation)
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to Docker Hub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version and build metadata
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Compute tags
        id: tags
        run: |
          VERSION=${{ steps.meta.outputs.version }}
          PG=${{ matrix.pg_version }}
          TAGS="${{ env.IMAGE }}:${VERSION}-pg${PG}"
          # The highest PG version also gets the bare version and latest tags
          if [ "$PG" = "17" ]; then
            TAGS="${TAGS},${{ env.IMAGE }}:${VERSION},${{ env.IMAGE }}:latest"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          file: Dockerfile.hub
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            PG_VERSION=${{ matrix.pg_version }}
            VERSION=${{ steps.meta.outputs.version }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            GIT_SHA=${{ github.sha }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=pg${{ matrix.pg_version }}
          cache-to: type=gha,scope=pg${{ matrix.pg_version }},mode=max
          provenance: true
          sbom: true

      - name: Scan for vulnerabilities
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # v0.28.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}-pg${{ matrix.pg_version }}
          format: sarif
          output: trivy-pg${{ matrix.pg_version }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true  # only flag CVEs that have a fix available

      - name: Upload Trivy results to Security tab
        uses: github/codeql-action/upload-sarif@f6091c0113d1dcf9b98e269ee48e8a7e51b7bdd4 # v3.28.5
        if: always()
        with:
          sarif_file: trivy-pg${{ matrix.pg_version }}.sarif
          category: trivy-pg${{ matrix.pg_version }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Sign image (keyless via GitHub OIDC — no secrets needed)
        run: |
          cosign sign --yes \
            ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}-pg${{ matrix.pg_version }}

      - name: Verify pushed image
        run: |
          docker pull ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}-pg${{ matrix.pg_version }}
          docker run --rm \
            -e POSTGRES_PASSWORD=postgres \
            ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}-pg${{ matrix.pg_version }} \
            postgres --version
