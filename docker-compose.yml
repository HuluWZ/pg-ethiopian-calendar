services:
  # Production-ready PostgreSQL with extension pre-built
  postgres:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PG_VERSION: ${PG_VERSION:?Set PG_VERSION in .env}
    container_name: ethiopian_calendar_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
    ports:
      - "${POSTGRES_PORT:?Set POSTGRES_PORT in .env}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pg_net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 10s
    command: postgres -c log_statement=all -c log_destination=stderr
    profiles:
      - production
      - default

  # Development mode - mounts source code, rebuilds on start
  postgres-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        PG_VERSION: ${PG_VERSION:?Set PG_VERSION in .env}
    container_name: ethiopian_calendar_postgres_dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "${POSTGRES_PORT:?Set POSTGRES_PORT in .env}:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      # Mount source code for live development
      - ./Makefile:/usr/src/extension/Makefile:ro
      - ./pg_ethiopian_calendar.control:/usr/src/extension/pg_ethiopian_calendar.control:ro
      - ./sql:/usr/src/extension/sql:ro
      - ./src:/usr/src/extension/src:ro
      - ./scripts:/usr/src/extension/scripts:ro
    networks:
      - pg_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 15s
    profiles:
      - dev

  # Test service - runs tests and exits
  test:
    build:
      context: .
      dockerfile: test/Dockerfile
      args:
        PG_VERSION: ${PG_VERSION:?Set PG_VERSION in .env}
    container_name: ethiopian_calendar_test
    environment:
      POSTGRES_USER: ${TEST_POSTGRES_USER:?Set TEST_POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${TEST_POSTGRES_PASSWORD:?Set TEST_POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${TEST_POSTGRES_DB:?Set TEST_POSTGRES_DB in .env}
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "${TEST_POSTGRES_PORT:?Set TEST_POSTGRES_PORT in .env}:5432"
    volumes:
      - test_data:/var/lib/postgresql/data
    networks:
      - pg_net
    profiles:
      - test

networks:
  pg_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  postgres_data_dev:
    driver: local
  test_data:
    driver: local
